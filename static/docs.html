const DOC_MD = `
# 航天发动机热试车数据智能分析系统

以航天液体/固体火箭发动机点火燃烧试验为研究对象，基于大模型 Agent 构建数据自动分析系统，实现从原始试验数据到结构化分析报告的全流程自动化。

---

## 研究方向

航天发动机专业，聚焦液体/固体火箭发动机点火燃烧试验的数据智能分析。

## 项目目标

构建一个基于大模型 Agent 的发动机热试车数据自动分析系统，实现：

1. 原始试验数据自动解析
2. 统计分析 + 信号处理
3. LLM/VLM 多模态智能分析
4. 格式化分析报告输出

## 输入数据

| 数据类型 | 来源 | 格式 |
|---------|------|------|
| 试车遥测数据 | 点火燃烧试验传感器采集 | Excel（.xlsx/.xls）、TXT（.txt） |
| 火焰图像 | 单反相机拍摄 | 尾部火焰图像 / 燃烧室内部火焰图像（JPG/PNG） |

## 分析工作流

\`\`\`
数据输入 → Python 脚本分析（统计/信号处理） → LLM/VLM 多模态分析 → 格式化输出
\`\`\`

---

|------|------|

| GPU 分配 | 本项目使用 cuda:6 和 cuda:7，其余 GPU 归团队其他成员使用 |
| Python 环境 | conda 虚拟环境 \`gy_pytorch\` |
| VLM 服务 | Qwen2.5-VL-7B（vLLM 部署于 localhost:8000） |

### 启动方式

---

## 功能模块

### 模块 1 — 数据导入

- **上传**：点击或拖拽 txt/csv 文件到上传区
- **进度条**：上传时显示发光边框动画 + 百分比 + 已传/总大小
- **文件管理**：已上传文件列表显示、重命名、删除
- **保存位置**：\`data/\` 目录
- 相关 API：\`POST /api/upload\`、\`GET /api/files\`、\`DELETE /api/files/{name}\`、\`PUT /api/files/{name}/rename\`

### 模块 2 — 数据分析

渐进式三步流程：

#### 第一步：选择数据源
左侧下拉框选择已上传的数据文件，点击「加载数据」

#### 第二步：数据概览
加载后显示：
- 统计卡片：文件名、列数、数据行数、Header 行号、文件大小
- Header 列名速查表：可滚动表格，支持关键词搜索过滤

#### 第三步：交互分析
- **交互式压力曲线**：Plotly 双 Y 轴图（压力 MPa + 当量比 Equivalent ratio），5 条压力通道 + 1 条当量比曲线，鼠标悬停显示具体数值，框选缩放
- **流道压力分布图**：沿流向 X 轴（0–2.85 m），8 个时刻各一条曲线，标记传感器位置
- **VLM 对话分析**：基于 Qwen2.5-VL-7B 对 blow-.png 压力曲线图进行智能分析，支持多轮对话（上下文 5 轮），SSE 流式输出，Markdown 渲染

相关 API：\`GET /api/data/info?filename=\`、\`GET /api/chart/pressure-time\`、\`GET /api/chart/pressure-distribution\`、\`POST /api/vlm/chat\`、\`GET /api/vlm/analyze-blow\`

### 模块 3 — 异常处理（待实现）

规划功能：
1. 上传 txt 数据文件，自动解析压力数据列
2. 3σ 方法检测异常点
3. Plotly.js 交互式图表（正常曲线 + 异常点红色标注）
4. 异常统计摘要拼接为 prompt，调用 LLM 分析

---

## 数据格式说明

### 试验数据文件

- **格式**：逗号分隔 txt 文件
- **编码**：UTF-8
- **表头行**：headerIndex = 10（即第 11 行为列名）
- **时间列**：第 0 列（Time (s)）
- **压力列**：由 \`A00_parameterData.py\` 中的 \`S_index\` 定义，共 54 个压力传感器通道
- **数据量**：约 4–5 万行

### 传感器布局

| 区域 | 数量 | 轴向位置 |
|------|:---:|------|
| 隔离段上侧 | 15 | 0.05–0.80 m |
| 一级支板/凹腔燃烧室 | 11 | 0.91–1.21 m |
| 二级支板/凹腔燃烧室 | 10 | 1.28–1.55 m |
| 火箭段 | 12 | 1.65–2.42 m |
| 喷管段 | 6 | 2.54–2.84 m |

**Q: 上传文件后数据分析模块看不到？**

(function initDocs() {
    const md = DOC_MD.trim();
    const content = document.getElementById('doc-content');
    const nav = document.getElementById('doc-nav');

    // 渲染 Markdown
    content.innerHTML = marked.parse(md);

    // 添加 id 到每个标题以便导航
    const titles = content.querySelectorAll('h2, h3');
    const navData = []; // [{type, text, id}]
    titles.forEach((t, i) => {
        const id = 'section-' + i;
        t.id = id;
        navData.push({ type: t.tagName, text: t.textContent, id });
    });

    // 构建导航树
    let navHTML = '';
    let currentH2Idx = -1;

    navData.forEach(item => {
        if (item.type === 'H2') {
            currentH2Idx++;
            navHTML += `<div class="nav-section">
                <div class="nav-section-title" data-idx="${currentH2Idx}">
                    <span class="arrow">▼</span> ${item.text}
                </div>
                <div class="nav-children" id="nav-children-${currentH2Idx}"></div>
            </div>`;
        } else {
            navHTML = navHTML.replace(
                `id="nav-children-${currentH2Idx}"></div>`,
                `id="nav-children-${currentH2Idx}"><a class="nav-link" href="#${item.id}">${item.text}</a>`
            );
        }
    });
    nav.innerHTML = navHTML || '<div style="padding:20px;color:var(--text-secondary);font-size:0.85rem;">无目录</div>';

    // 折叠/展开
    nav.querySelectorAll('.nav-section-title').forEach(title => {
        title.addEventListener('click', () => {
            title.classList.toggle('collapsed');
            const idx = title.dataset.idx;
            const children = document.getElementById('nav-children-' + idx);
            if (children) children.classList.toggle('collapsed');
        });
    });

    // Scroll spy
    const allLinks = nav.querySelectorAll('.nav-link');
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                allLinks.forEach(l => l.classList.remove('active'));
                const link = nav.querySelector(`a[href="#${e.target.id}"]`);
                if (link) link.classList.add('active');
            }
        });
    }, { rootMargin: '-10% 0px -80% 0px' });
    titles.forEach(t => observer.observe(t));
})();
</script>
